name: Test

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    name: Build and Test
    runs-on: macos-26
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pinned hosted toolchain
        run: ./ci_scripts/setup_hosted_ci_runner.sh

      - name: Verify pinned Apple toolchain
        run: ./scripts/check_apple_release_inputs.sh --toolchain-only

      - name: Validate architecture
        run: python3 scripts/check_architecture.py --self-test

      - name: Install pinned Rust quality tools
        run: |
          command -v cargo-deny >/dev/null || cargo install cargo-deny --version 0.20.2 --locked
          command -v cargo-audit >/dev/null || cargo install cargo-audit --version 0.22.2 --locked
          cargo ndk --version 2>/dev/null | grep -q ' 4.1.2$' || cargo install cargo-ndk --version 4.1.2 --locked

      - name: Validate Rust workspace
        run: ./scripts/check_rust.sh

      - name: Detect generated binding drift
        run: ./scripts/check_core_binding_drift.sh

      - name: Compile and exercise Kotlin bindings
        run: ./scripts/check_kotlin_core_bindings.sh

      - name: Validate Apple and Android core portability
        run: ./scripts/check_core_portability.sh

      - name: Upload qualified core artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pod0-core-${{ github.sha }}
          path: .build/pod0core
          if-no-files-found: error

      - name: Bootstrap project
        run: ./ci_scripts/bootstrap_project.sh

      - name: Detect generated Xcode project drift
        run: git diff --exit-code -- Podcastr.xcodeproj/project.pbxproj

      - name: Build and test
        run: ./ci_scripts/run_tests.sh

      - name: Reconstruct workflow across process termination
        run: ./scripts/test-workflow-process-reconstruction.sh

      - name: Create non-publishing release archive
        run: ./ci_scripts/archive_without_upload.sh

      - name: Upload non-publishing archive evidence
        uses: actions/upload-artifact@v4
        with:
          name: ios-archive-evidence-${{ github.sha }}
          path: build/non-publishing/archive-evidence.txt
          if-no-files-found: error
