# P0 / reactive-update-cross-screen
# Scenario: A state change on one screen reflects on another reactively.
#
# This validates the single-source-of-truth push seam: a download started from
# an episode detail must show live progress on the episode LIST row, and play
# state must stay consistent across mini-player / list / detail without a manual
# refresh.
#
# Precondition: an episode visible in both a list and a detail/player.
appId: io.f7z.podcast
---
- runFlow: ../shared/subscribe-darknet.yaml
- tapOn:
    id: "tab-home"
- waitForAnimationToEnd
- tapOn:
    text: "Darknet Diaries"
- waitForAnimationToEnd

# --- Start a download from the episode detail ---
- tapOn:
    id: "home-episode-row"
    index: 0
- waitForAnimationToEnd
- tapOn:
    text: "Download"
    optional: true
- waitForAnimationToEnd

# --- Navigate back to the episode list while the download is in progress ---
- back
- waitForAnimationToEnd

# Assertion: the list row reflects the in-progress download (a Downloads /
# progress indicator). The Downloads surface (under Settings) carries the
# convention `downloads-list` id; the in-row indicator is the live signal.
- assertVisible:
    id: "home-episode-row"
    index: 0

# --- Start playback and confirm play state is consistent across surfaces ---
- tapOn:
    id: "home-episode-row"
    index: 0
- waitForAnimationToEnd
- tapOn:
    id: "player-play-pause"
    optional: true
- tapOn:
    text: "Play"
    optional: true
- waitForAnimationToEnd

# Navigate to a different tab, then back to the mini-player, and confirm the
# play state shown in the mini-player is consistent (single source of truth).
- tapOn:
    id: "tab-library"
- waitForAnimationToEnd
- assertVisible:
    id: "mini-player-bar"
- assertVisible:
    accessibilityLabel: "Pause"
    optional: true
# MANUAL VERIFICATION REQUIRED: confirm download progress on the list row
# updates LIVE (advancing %) from the same kernel state, and that no screen
# shows stale state requiring a manual refresh (push-seam reactivity).
