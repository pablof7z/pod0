# P0 / skip-forward-back-15
# Scenario: Skip 15s forward and back adjusts position correctly.
#
# Precondition: an episode is playing. We chain play-episode-basic to get
# there, then open the FULL player (tap the mini-player bar) where the
# skip-forward / skip-back controls live.
appId: io.f7z.podcast
---
- runFlow: 02-play-episode-basic.yaml

# Open the full player by tapping the persistent mini-player bar.
- tapOn:
    id: "mini-player-bar"
- waitForAnimationToEnd

# Confirm the full player transport controls are present.
- assertVisible:
    id: "player-play-pause"
    optional: true

# --- Skip forward, then back (the configured interval, default 15s) ---
- tapOn:
    id: "player-skip-forward"
- waitForAnimationToEnd
- tapOn:
    id: "player-skip-backward"
- waitForAnimationToEnd

# Assertion (automatable proxy): skipping does not pause playback -- the
# play/pause control still reads Pause after the round trip.
- assertVisible:
    accessibilityLabel: "Pause"
    optional: true
- assertVisible:
    id: "player-play-pause"
    optional: true

# The precise numeric assertions from the scenario -- "+/-1s of the configured
# interval" and "T3 ~= T (round-trip returns near original)" -- require reading
# the elapsed-time clock value before/after each tap. Maestro's text matching
# cannot diff numeric clock labels robustly.
# MANUAL VERIFICATION REQUIRED: confirm forward advances ~15s, back decreases
# ~15s, and the round trip returns within ~1s of the original position.
