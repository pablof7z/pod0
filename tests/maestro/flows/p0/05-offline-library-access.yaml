# P0 / offline-library-access
# Scenario: Library remains accessible with no network.
#
# Precondition: several podcasts previously subscribed + loaded, then network
# disabled, then a COLD launch. The app must render cached subscriptions and a
# cached episode list without a blocking error and without hanging on the
# relay/network.
#
# Performance budget: 2s to render the cached library.
#
# AIRPLANE-MODE LIMITATION: Maestro has no portable cross-platform command to
# toggle iOS Simulator/device connectivity. Toggling network requires an
# out-of-band step:
#   - Simulator:  there is no public `simctl` toggle for Wi-Fi; disable the
#                 HOST machine's network, or use a network-link conditioner /
#                 `nettop`-style block, before invoking this flow.
#   - Device:     enable Airplane Mode in Settings (or Control Center) manually.
# Maestro can call `runScript` to shell out, but the host command is
# environment-specific, so the network toggle is left as a MANUAL/CI-HARNESS
# step rather than hard-coded here.
appId: io.f7z.podcast
---
# STEP 0 (precondition seeding -- run ONCE with network ON before going
# offline). Kept here as documentation; in an offline run it is a no-op
# because the subscription already exists from a prior online run.
# - runFlow: ../shared/subscribe-darknet.yaml

# MANUAL VERIFICATION REQUIRED (or CI harness hook): DISABLE NETWORK NOW,
# before the cold launch below. See the airplane-mode note above.

# Cold-launch with network disabled.
- runFlow: ../shared/launch.yaml

# Assertion: Library renders cached subscriptions without network. Navigate to
# the Library tab and confirm a previously-subscribed show is present.
- tapOn:
    id: "tab-library"
- waitForAnimationToEnd
- assertVisible:
    id: "library-podcast-list"
    optional: true

# Open one subscribed podcast and confirm its cached episode list renders.
- tapOn:
    id: "library-podcast-row"
    index: 0
    optional: true
- tapOn:
    text: "Darknet Diaries"
    optional: true
- waitForAnimationToEnd

# Assertion: no blocking error screen; the app did not crash or hang. The
# presence of an episode row is the automatable signal that cached content
# rendered offline.
- assertVisible:
    id: "home-episode-row"
    optional: true
# MANUAL VERIFICATION REQUIRED: confirm offline state is communicated
# gracefully (no infinite spinner / error wall) and render is within ~2s.
