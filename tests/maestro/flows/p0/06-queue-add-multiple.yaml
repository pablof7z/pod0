# P0 / queue-add-multiple
# Scenario: Add multiple episodes to the queue.
#
# Precondition: at least 3 episodes available across subscriptions, queue empty.
# We subscribe to Darknet Diaries (many episodes) as the source.
#
# Reality note: "Add to Queue" is an episode-row CONTEXT MENU action
# (long-press) -- verified against
# App/Sources/Features/Library/EpisodeRowContextMenu.swift ("Add to Queue").
# The queue is viewed via the player's PlayerQueueSheet (Up Next).
appId: io.f7z.podcast
---
- runFlow: ../shared/subscribe-darknet.yaml
- tapOn:
    id: "tab-home"
- waitForAnimationToEnd
- tapOn:
    text: "Darknet Diaries"
- waitForAnimationToEnd

# --- Add episode A to the queue (long-press -> Add to Queue) ---
- longPressOn:
    id: "home-episode-row"
    index: 0
- tapOn:
    text: "Add to Queue"
- waitForAnimationToEnd

# --- Add episode B ---
- longPressOn:
    id: "home-episode-row"
    index: 1
- tapOn:
    text: "Add to Queue"
- waitForAnimationToEnd

# --- Add episode C ---
- longPressOn:
    id: "home-episode-row"
    index: 2
- tapOn:
    text: "Add to Queue"
- waitForAnimationToEnd

# --- Open the Queue (Up Next) view ---
# The queue sheet is reached from the player. Open the full player first if a
# mini-player is present, then the queue/Up-Next affordance. These controls
# have no convention id yet -> stable text "Up Next" / "Queue".
- tapOn:
    id: "mini-player-bar"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Up Next"
    optional: true
- tapOn:
    text: "Queue"
    optional: true
- waitForAnimationToEnd

# Assertion: the queue shows 3 entries. We cannot read the exact A/B/C order or
# a numeric "3" badge from static text reliably, but the queue view rendering
# with episode rows is the automatable signal.
- assertVisible:
    text: "Up Next"
    optional: true
# MANUAL VERIFICATION REQUIRED: confirm the queue contains exactly A, B, C in
# the order added, the count badge equals 3, and each entry shows the correct
# title + source podcast.
