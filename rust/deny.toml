[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
unmaintained = "workspace"
ignore = [
    { id = "RUSTSEC-2026-0118", reason = "NMP bootstrap is not linked into the facade or native app; issue #85 blocks all consumers until the dependency graph is fixed." },
    { id = "RUSTSEC-2026-0119", reason = "NMP bootstrap is not linked into the facade or native app; issue #85 blocks all consumers until the dependency graph is fixed." },
]

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "Unicode-3.0",
    "Zlib",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = ["https://github.com/pablof7z/nmp.git"]
